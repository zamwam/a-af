    <div class="container">
      <h1>A-Affordable Insurance Calculator</h1>
      <h2>Premium Quote & Vehicle Registration Tools</h2>

      <div class="section">
        <h2>Premium Quote Calculator</h2>

        <label for="customer">Customer Name</label>
        <input id="customer" placeholder="Customer Name" type="text" />

        <label for="premium">Premium Amount ($)</label>
        <input id="premium" type="number" placeholder="Annual Premium Amount" />

        <label for="down">Downpayment %</label>
        <input id="down" type="number" placeholder="Downpayment Percentage" />

        <label for="company">Insurance Company</label>
        <select id="company"></select>

        <label for="term">Number of Monthly Payments</label>
        <select id="term">
          <option value="">Select Months</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
        </select>

        <button class="primary" onclick="calculatePremium()">
          Calculate Premium
        </button>
        <button class="secondary" onclick="resetPremium()">Reset</button>

        <div id="premiumResult" class="result"></div>
        <button class="primary full" onclick="generatePremiumPDF()">
          Generate PDF Quote
        </button>
      </div>

      <div class="section">
        <h2>Registration Quote Calculator</h2>

        <div class="grid">
          <div style="width: 95%" class="full">
            <label for="name">Customer Name</label>
            <input id="name" placeholder="Customer Name" type="text" />
          </div>

          <div class="full">
            <label for="sale">Sale Type</label>
            <select id="sale" onchange="handleSaleChange()">
              <option value="Dealer Sale">Dealer Sale</option>
              <option value="Private Sale">Private Sale</option>
              <option value="Gift">Gift</option>
            </select>
          </div>

          <div style="width: 95%">
            <label for="price">Sale Price ($)</label>
            <input id="price" type="number" placeholder="Sale Price" />
          </div>

          <div style="width: 95%">
            <label for="value">Book Value ($)</label>
            <input id="value" type="number" placeholder="Book Value" />
          </div>

          <div class="full">
            <label for="plate">Plate Type</label>
            <select id="plate"></select>
          </div>

          <div class="full">
            <label for="register">Register With Agency?</label>
            <select id="register" onchange="handleRegisterChange()">
              <option value="Register With Agency">Register With Agency</option>
              <option value="No">No</option>
              <option value="Yes">Yes</option>
            </select>
          </div>

          <div class="full">
            <label for="policy">Policy Type</label>
            <select id="policy">
              <option value="">Select Policy Type</option>
              <option value="MAIP">MAIP</option>
              <option value="Direct">Direct</option>
            </select>
          </div>

          <button onclick="calculateRegistration()" class="primary full">
            Calculate Registration
          </button>
          <button onclick="generateRegistrationPDF()" class="primary full">
            Generate PDF Quote
          </button>
        </div>

        <div id="regResult" class="result"></div>
      </div>
